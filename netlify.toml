[build]
  base = "bieli-frontend"
  command = "npm install && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://mes-projet-production.up.railway.app"

[[redirects]]
  from = "/api/*"
  to = "https://mes-projet-production.up.railway.app/api/:splat"
  status = 200
  force = true
