[build]
  base    = "bieli-frontend"
  command = "yarn install && yarn build"
  publish = "bieli-frontend/.next"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* → Railway backend (évite les erreurs CORS)
[[redirects]]
  from   = "/api/*"
  to     = "https://mes-projet-production.up.railway.app/api/:splat"
  status = 200
  force  = true
